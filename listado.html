<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Miembros - DCC</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>
        <h1>Miembros Registrados</h1>
    </header>

    <main>
        <section id="controles">
            <label for="filtroTipo">Filtrar por:</label>
            <select id="filtroTipo" onchange="mostrarMiembros()">
                <option value="todos">Todos</option>
                <option value="estudiante">Estudiantes</option>
                <option value="funcionario">Funcionarios</option>
                <option value="academico">Académicos</option>
            </select>

            <label for="ordenarPor">Ordenar por:</label>
            <select id="ordenarPor" onchange="mostrarMiembros()">
                <option value="nombre">Nombre</option>
                <option value="email">Email</option>
            </select>
        </section>

        <section id="lista-container">
            <div id="lista">
            </div>
        </section>

        <nav id="paginacion">
            <button id="btnAnterior" onclick="cambiarPagina(-1)">Anterior</button>
            <span id="infoPagina">Página 1</span>
            <button id="btnSiguiente" onclick="cambiarPagina(1)">Siguiente</button>
        </nav>

        <nav>
            <br>
            <a href="index.html">Volver al inicio</a>
        </nav>
    </main>

    <script src="app.js"></script>
</body>

</html>
